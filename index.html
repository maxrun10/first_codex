<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>iPhone Gallery WebView</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="iPhone gallery webview preview">
      <header class="top-bar">
        <div class="status">9:41</div>
        <h1>Gallery</h1>
      </header>

      <section class="hero-card" aria-label="Featured photo">
        <img
          src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=80"
          alt="Featured mountain lake"
        />
        <div class="hero-label">Featured</div>
      </section>

      <section class="grid" aria-label="Photo gallery">
        <img src="https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13?auto=format&fit=crop&w=600&q=80" alt="Palm trees" />
        <img src="https://images.unsplash.com/photo-1439066615861-d1af74d74000?auto=format&fit=crop&w=600&q=80" alt="Ocean waves" />
        <img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?auto=format&fit=crop&w=600&q=80" alt="Forest" />
        <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3?auto=format&fit=crop&w=600&q=80" alt="Road trip" />
        <img src="https://images.unsplash.com/photo-1482192505345-5655af888cc4?auto=format&fit=crop&w=600&q=80" alt="Sunset" />
        <img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98?auto=format&fit=crop&w=600&q=80" alt="Bridge" />
      </section>
    </main>
  </body>
</html>
